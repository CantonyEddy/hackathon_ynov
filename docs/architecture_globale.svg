<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c566a"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#4c566a"/>
    </marker>
  </defs>

  <!-- Outer machine boundary -->
  <rect x="15" y="15" width="910" height="440" rx="14" fill="#f7f9fb" stroke="#8a94a6" stroke-width="1.5"/>
  <text x="470" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2430">PC portable unique — Arch Linux · inférence CPU</text>

  <!-- Navigateur / Frontend -->
  <text x="42" y="82" font-size="13" font-weight="700" fill="#57606a">NAVIGATEUR</text>
  <rect x="40" y="92" width="195" height="98" rx="10" fill="#ffffff" stroke="#3b4252" stroke-width="1.5"/>
  <text x="137" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2430">Frontend</text>
  <text x="137" y="141" text-anchor="middle" font-size="12.5" fill="#3b4252">HTML / CSS / JS natif</text>
  <text x="137" y="160" text-anchor="middle" font-size="11.5" fill="#6b7280">état connexion · chat</text>
  <text x="137" y="176" text-anchor="middle" font-size="11.5" fill="#6b7280">config URL serveur</text>

  <rect x="40" y="212" width="195" height="66" rx="10" fill="#ffffff" stroke="#3b4252" stroke-width="1.5"/>
  <text x="137" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2430">localStorage</text>
  <text x="137" y="258" text-anchor="middle" font-size="11.5" fill="#6b7280">historique persistant</text>
  <line x1="137" y1="190" x2="137" y2="212" stroke="#9aa3af" stroke-width="1.3" stroke-dasharray="3 3"/>

  <!-- Proxy server.py -->
  <rect x="360" y="88" width="255" height="210" rx="10" fill="#eef3fb" stroke="#3b5a8a" stroke-width="1.5"/>
  <text x="487" y="115" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2f4d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rendu/devweb/server.py</text>
  <text x="487" y="134" text-anchor="middle" font-size="11.5" fill="#3b5a8a">proxy Python stdlib · 0 dépendance</text>
  <line x1="378" y1="146" x2="597" y2="146" stroke="#b9c6dc" stroke-width="1"/>
  <text x="378" y="172" font-size="12.5" fill="#1f2430">▪ sert le frontend (webapp/)</text>
  <text x="378" y="198" font-size="12.5" fill="#1f2430">▪ GET  /health</text>
  <text x="378" y="224" font-size="12.5" fill="#1f2430">▪ POST /api/chat</text>
  <text x="487" y="266" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">même port (8001)</text>
  <text x="487" y="282" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">→ pas de CORS</text>

  <!-- Ollama -->
  <rect x="690" y="88" width="222" height="150" rx="10" fill="#edf6ef" stroke="#2f6d43" stroke-width="1.5"/>
  <text x="801" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a29">Ollama — service systemd</text>
  <text x="801" y="134" text-anchor="middle" font-size="11.5" fill="#2f6d43" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">http://localhost:11434</text>
  <line x1="708" y1="146" x2="894" y2="146" stroke="#bcd7c4" stroke-width="1"/>
  <text x="708" y="172" font-size="12" fill="#1f2430">▪ GET  /api/tags  (health)</text>
  <text x="708" y="198" font-size="12" fill="#1f2430">▪ POST /api/chat</text>
  <text x="708" y="223" font-size="11.5" fill="#6b7280">routes natives Ollama</text>

  <!-- Model -->
  <rect x="690" y="268" width="222" height="112" rx="10" fill="#edf6ef" stroke="#2f6d43" stroke-width="1.5"/>
  <text x="801" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a29">Modèle phi35-financial</text>
  <text x="801" y="318" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2f6d43">= Phi-3.5 base PROPRE</text>
  <text x="801" y="342" text-anchor="middle" font-size="12" fill="#b02a37">≠ adapter LoRA compromis</text>
  <text x="801" y="364" text-anchor="middle" font-size="11" fill="#6b7280">(décision #2)</text>

  <!-- Arrow: Frontend <-> server.py -->
  <text x="297" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#4c566a">HTTP :8001</text>
  <line x1="235" y1="145" x2="360" y2="145" stroke="#4c566a" stroke-width="1.8" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/>

  <!-- Arrow: server.py -> Ollama -->
  <text x="652" y="150" text-anchor="middle" font-size="11" fill="#4c566a">proxifie</text>
  <line x1="615" y1="162" x2="690" y2="162" stroke="#4c566a" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Arrow: Ollama -> Model -->
  <text x="828" y="258" font-size="11" fill="#4c566a">sert</text>
  <line x1="801" y1="238" x2="801" y2="268" stroke="#4c566a" stroke-width="1.8" marker-end="url(#arrow)"/>
</svg>
