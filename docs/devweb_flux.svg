<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 350" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="req" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b5a8a"/>
    </marker>
    <marker id="res" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Bands -->
  <rect x="20" y="78" width="900" height="112" rx="8" fill="#f2f6fc"/>
  <rect x="20" y="200" width="900" height="132" rx="8" fill="#f1faf3"/>

  <!-- Actor headers -->
  <rect x="55" y="16" width="190" height="46" rx="9" fill="#ffffff" stroke="#3b4252" stroke-width="1.5"/>
  <text x="150" y="39" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2430">Navigateur</text>
  <text x="150" y="55" text-anchor="middle" font-size="10.5" fill="#6b7280">frontend statique</text>

  <rect x="380" y="16" width="200" height="46" rx="9" fill="#eef3fb" stroke="#3b5a8a" stroke-width="1.5"/>
  <text x="480" y="39" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2f4d">server.py</text>
  <text x="480" y="55" text-anchor="middle" font-size="10.5" fill="#3b5a8a">proxy stdlib · :8001</text>

  <rect x="700" y="16" width="185" height="46" rx="9" fill="#edf6ef" stroke="#2f6d43" stroke-width="1.5"/>
  <text x="792" y="39" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a29">Ollama</text>
  <text x="792" y="55" text-anchor="middle" font-size="10.5" fill="#2f6d43">systemd · :11434</text>

  <!-- Lifelines -->
  <line x1="150" y1="62" x2="150" y2="336" stroke="#c3cad6" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="480" y1="62" x2="480" y2="336" stroke="#c3cad6" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="792" y1="62" x2="792" y2="336" stroke="#c3cad6" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- Band 1 title -->
  <text x="34" y="98" font-size="12.5" font-weight="700" fill="#3b5a8a">1 · Health-check (au chargement)</text>

  <!-- health: N -> S -->
  <text x="315" y="118" text-anchor="middle" font-size="11.5" fill="#1f2430" font-family="ui-monospace, Menlo, monospace">GET /health</text>
  <line x1="150" y1="124" x2="480" y2="124" stroke="#3b5a8a" stroke-width="1.7" marker-end="url(#req)"/>
  <!-- S -> O -->
  <text x="636" y="118" text-anchor="middle" font-size="11.5" fill="#1f2430" font-family="ui-monospace, Menlo, monospace">GET /api/tags</text>
  <line x1="480" y1="124" x2="792" y2="124" stroke="#3b5a8a" stroke-width="1.7" marker-end="url(#req)"/>
  <!-- O -> S return -->
  <text x="636" y="150" text-anchor="middle" font-size="11" fill="#4b5563">phi35-financial présent</text>
  <line x1="792" y1="156" x2="480" y2="156" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#res)"/>
  <!-- S -> N return -->
  <text x="315" y="176" text-anchor="middle" font-size="11" fill="#4b5563" font-family="ui-monospace, Menlo, monospace">{status:ok, backend, model}</text>
  <line x1="480" y1="182" x2="150" y2="182" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#res)"/>

  <!-- Band 2 title -->
  <text x="34" y="220" font-size="12.5" font-weight="700" fill="#2f6d43">2 · Envoi d'un message</text>

  <!-- chat: N -> S -->
  <text x="315" y="240" text-anchor="middle" font-size="11.5" fill="#1f2430" font-family="ui-monospace, Menlo, monospace">POST /api/chat  {message}</text>
  <line x1="150" y1="246" x2="480" y2="246" stroke="#3b5a8a" stroke-width="1.7" marker-end="url(#req)"/>
  <!-- S -> O -->
  <text x="636" y="266" text-anchor="middle" font-size="11" fill="#1f2430" font-family="ui-monospace, Menlo, monospace">POST /api/chat  {model, messages}</text>
  <line x1="480" y1="272" x2="792" y2="272" stroke="#3b5a8a" stroke-width="1.7" marker-end="url(#req)"/>
  <!-- O -> S return -->
  <text x="636" y="296" text-anchor="middle" font-size="11" fill="#4b5563" font-family="ui-monospace, Menlo, monospace">{message:{content}}</text>
  <line x1="792" y1="302" x2="480" y2="302" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#res)"/>
  <!-- S -> N return -->
  <text x="315" y="322" text-anchor="middle" font-size="11" fill="#4b5563" font-family="ui-monospace, Menlo, monospace">{response}</text>
  <line x1="480" y1="328" x2="150" y2="328" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#res)"/>
</svg>
