<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant IA • Interface</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <p class="eyebrow">Interface de conversation</p>
            <h1>Assistant IA</h1>
          </div>
        </div>

        <button id="new-chat" class="ghost-btn" type="button">Nouvelle conversation</button>

        <section class="panel status-card">
          <div class="panel-title">Connexion</div>
          <p id="server-status">Vérification…</p>
          <p id="server-model">Mode de secours</p>
          <label class="config-label" for="backend-url">Adresse du serveur</label>
          <input id="backend-url" type="text" value="http://127.0.0.1:8001" />
          <button id="connect-backend" type="button">Connecter</button>
        </section>

        <section class="panel history-block">
          <div class="section-title">Conversations</div>
          <ul class="history-list">
            <li class="history-item active">
              <span class="history-dot accent"></span>
              <div>
                <strong>Analyse financière</strong>
                <small>Évaluation du risque</small>
              </div>
            </li>
            <li class="history-item">
              <span class="history-dot muted"></span>
              <div>
                <strong>Support médical</strong>
                <small>Conseils généraux</small>
              </div>
            </li>
            <li class="history-item">
              <span class="history-dot soft"></span>
              <div>
                <strong>Rapport d’opérations</strong>
                <small>Résumé de la journée</small>
              </div>
            </li>
          </ul>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <h2>Conversation</h2>
            <p>Un espace simple, calme et orienté contenu.</p>
          </div>
          <button id="clear-chat" class="ghost-btn" type="button">Effacer</button>
        </header>

        <section id="messages" class="messages">
          <div id="thread" class="thread"></div>
        </section>

        <form id="chat-form" class="composer">
          <textarea id="message-input" placeholder="Écrivez votre requête…" rows="1"></textarea>
          <button type="submit">Envoyer</button>
        </form>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
